name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build and sign release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m'
          ORG_GRADLE_PROJECT_KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_KEY_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk track-frame-${{ github.ref_name }}.apk

      - name: Clean up keystore
        if: always()
        run: rm -f release.jks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: track-frame-${{ github.ref_name }}.apk
          generate_release_notes: true
